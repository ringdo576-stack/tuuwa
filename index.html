<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Meet Clone with Breakout Rooms</title>
    <!-- PeerJS & FontAwesome の読み込み -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: #202124; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ヘッダー */
        header { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: #202124; border-bottom: 1px solid #3c4043; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; color: #e8eaed; }
        .logo i { color: #00ea96; }
        .time-display { font-size: 18px; color: #9aa0a6; }

        /* メインエリア */
        .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* 左側: ロビー ＆ メンバー分割コントロール */
        .lobby { width: 360px; background: #292a2d; border-right: 1px solid #3c4043; padding: 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; z-index: 10; }
        h2 { font-size: 16px; font-weight: 500; color: #e8eaed; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { background: #3c4043; border: 1px solid #5f6368; color: #fff; padding: 10px; border-radius: 4px; font-size: 14px; outline: none; }
        input:focus { border-color: #8ab4f8; }
        button { background: #1a73e8; color: white; border: none; padding: 10px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        .btn-secondary { background: #3c4043; }
        .btn-secondary:hover { background: #4f5357; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        
        /* ルームリスト・メンバー分割エリア */
        .room-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .room-item { background: #3c4043; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .room-name { font-weight: bold; font-size: 13px; color: #e8eaed; }
        .room-actions { display: flex; gap: 6px; }
        .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 20px; }
        .btn-danger { background: #ea4335; }
        .btn-danger:hover { background: #d93025; }

        /* 分割グループ専用表示 */
        .breakout-box { background: #202124; padding: 12px; border-radius: 6px; border: 1px dashed #5f6368; }

        /* 右側: ビデオグリッドエリア */
        .video-grid-container { flex: 1; display: flex; flex-direction: column; background: #171717; position: relative; padding: 16px; }
        .status-bar { background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; position: absolute; top: 24px; left: 24px; font-size: 14px; color: #e8eaed; z-index: 5; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; background: #f4b400; border-radius: 50%; }
        .status-dot.active { background: #00ea96; }

        .video-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; align-items: center; justify-content: center; max-width: 1200px; margin: 0 auto; width: 100%; }
        .video-wrapper { position: relative; background: #202124; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .screen-video video { transform: none; }
        .user-name { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 4px; font-size: 14px; }
        .avatar-placeholder { position: absolute; font-size: 48px; color: #5f6368; display: none; }
        .video-off .avatar-placeholder { display: block; }
        .video-off video { opacity: 0; }

        /* 下部コントロールバー */
        .controls-bar { height: 80px; background: #202124; border-top: 1px solid #3c4043; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .left-controls { font-size: 16px; color: #e8eaed; min-width: 240px; }
        .center-controls { display: flex; gap: 12px; }
        .icon-btn { width: 48px; height: 48px; border-radius: 50%; background: #3c4043; border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .icon-btn:hover { background: #4f5357; }
        .icon-btn.muted { background: #ea4335; }
        .icon-btn.muted:hover { background: #d93025; }
        .icon-btn.active-screen { background: #8ab4f8; color: #202124; }
        .btn-end-call { background: #ea4335; width: 64px; border-radius: 24px; }
        .btn-end-call:hover { background: #d93025; }
        .right-controls { min-width: 240px; display: flex; justify-content: flex-end; gap: 16px; color: #9aa0a6; font-size: 18px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-video"></i>
            <span>Google Meet <strong>Breakout</strong></span>
        </div>
        <div class="time-display" id="clock">00:00</div>
    </header>

    <div class="main-container">
        <!-- 左側コントロールパネル -->
        <div class="lobby">
            <!-- 通常の会議室作成 -->
            <div class="input-group">
                <h2>メイン会議室</h2>
                <input type="text" id="roomIdInput" placeholder="本会場の部屋名（日本語OK）">
                <button id="createBtn"><i class="fa-solid fa-plus"></i> 会議を開く（自動参加）</button>
            </div>
            
            <!-- メンバーを分ける（ブレイクアウト）コントロール -->
            <div class="breakout-box" id="breakoutController" style="display:none;">
                <h2><i class="fa-solid fa-users-gear"></i> メンバーをグループに分ける</h2>
                <div class="input-group" style="margin-top:8px;">
                    <label style="font-size:12px; color:#9aa0a6;">分けるグループ数:</label>
                    <select id="groupCountSelect">
                        <option value="2">2 グループ</option>
                        <option value="3">3 グループ</option>
                        <option value="4">4 グループ</option>
                    </select>
                    <button id="startBreakoutBtn" class="btn-success">グループ作成・同期</button>
                    <button id="stopBreakoutBtn" class="btn-danger btn-sm" style="display:none; margin-top:5px;">グループ全解散</button>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #3c4043;">

            <!-- 進行中の会議 / 分かれたグループ一覧 -->
            <div class="room-list-container">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>現在入れる部屋リスト</h2>
                    <button id="refreshBtn" class="btn-secondary btn-sm"><i class="fa-solid fa-rotate"></i></button>
                </div>
                <ul class="room-list" id="roomList"></ul>
            </div>
        </div>

        <!-- 右側: ビデオ画面 -->
        <div class="video-grid-container">
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">ロビーで待機中</span>
            </div>

            <div class="video-grid">
                <div class="video-wrapper" id="localVideoWrapper">
                    <i class="fa-solid fa-user avatar-placeholder"></i>
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="user-name">あなた</div>
                </div>
                <div class="video-wrapper video-off" id="remoteVideoWrapper" style="display: none;">
                    <i class="fa-solid fa-user avatar-placeholder"></i>
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="user-name" id="remoteUserName">参加者</div>
                </div>
            </div>
        </div>
    </div>

    <!-- コントロールバー -->
    <div class="controls-bar">
        <div class="left-controls" id="meetingCodeDisplay">会議に参加していません</div>
        <div class="center-controls">
            <button class="icon-btn" id="micBtn" title="マイク"><i class="fa-solid fa-microphone"></i></button>
            <button class="icon-btn muted" id="camBtn" title="カメラ"><i class="fa-solid fa-video-slash"></i></button>
            <button class="icon-btn" id="screenBtn" title="画面共有 (1080p/70fps)"><i class="fa-solid fa-desktop"></i></button>
            <button class="icon-btn btn-end-call" id="endCallBtn" title="退室・削除" style="display:none;"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
        <div class="right-controls"><i class="fa-solid fa-users"></i></div>
    </div>

<script>
const ROOM_PREFIX = "gmeet-breakout-";
let peer = null, localStream = null, currentCall = null;
let isHost = false, activeRoomName = "", mainRoomName = "";

const clockEl = document.getElementById('clock'), statusDot = document.getElementById('statusDot'), statusText = document.getElementById('statusText');
const roomIdInput = document.getElementById('roomIdInput'), createBtn = document.getElementById('createBtn'), roomList = document.getElementById('roomList'), refreshBtn = document.getElementById('refreshBtn');
const localVideo = document.getElementById('localVideo'), remoteVideo = document.getElementById('remoteVideo'), localVideoWrapper = document.getElementById('localVideoWrapper'), remoteVideoWrapper = document.getElementById('remoteVideoWrapper'), meetingCodeDisplay = document.getElementById('meetingCodeDisplay');
const micBtn = document.getElementById('micBtn'), camBtn = document.getElementById('camBtn'), screenBtn = document.getElementById('screenBtn'), endCallBtn = document.getElementById('endCallBtn');
const breakoutController = document.getElementById('breakoutController'), startBreakoutBtn = document.getElementById('startBreakoutBtn'), stopBreakoutBtn = document.getElementById('stopBreakoutBtn'), groupCountSelect = document.getElementById('groupCountSelect');

setInterval(() => { clockEl.innerText = new Date().toTimeString().split(' ')[0].substring(0, 5); }, 1000);
function encodeRoomName(str) { return Array.from(new TextEncoder().encode(str)).map(b => b.toString(16).padStart(2, '0')).join(''); }
function updateStatus(text, isActive = false) { statusText.innerText = text; statusDot.className = isActive ? "status-dot active" : "status-dot"; }

async function initLocalStream() {
    if (localStream) return true; // 部屋移動時はデバイスを再取得しない
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        stream.getVideoTracks().forEach(t => t.enabled = false);
        localStream = stream;
        localVideo.srcObject = stream;
        localVideoWrapper.classList.add('video-off');
        return true;
    } catch (e) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localVideo.srcObject = localStream;
            localVideoWrapper.classList.add('video-off');
            return true;
        } catch (err) { return false; }
    }
}

// リスト同期（メイン部屋と分割されたグループ部屋をまとめて管理）
function syncGlobalRooms() {
    roomList.innerHTML = "";
    let data = JSON.parse(localStorage.getItem('gmeet_breakout_data') || '{}');
    
    if (Object.keys(data).length === 0) {
        roomList.innerHTML = `<li style="font-size:12px; color:#9aa0a6;">有効な会議がありません</li>`;
        return;
    }

    Object.keys(data).forEach(mainName => {
        // 1. メイン会議室の表示
        const liMain = document.createElement('li');
        liMain.className = "room-item";
        liMain.innerHTML = `
            <div class="room-info"><span class="room-name">🏰 本会場: ${mainName}</span></div>
            <div class="room-actions">
                <button class="btn-secondary btn-sm" onclick="switchRoom('${mainName}', '${mainName}')">移動</button>
                <button class="btn-danger btn-sm" onclick="deleteMainRoom('${mainName}')"><i class="fa-solid fa-trash"></i></button>
            </div>
        `;
        roomList.appendChild(liMain);

        // 2. 分割されたグループ部屋（あれば）の表示
        if (data[mainName].subRooms && data[mainName].subRooms.length > 0) {
            data[mainName].subRooms.forEach(subName => {
                const liSub = document.createElement('li');
                liSub.className = "room-item";
                liSub.style.marginLeft = "15px";
                liSub.style.background = "#1a73e822";
                liSub.innerHTML = `
                    <div class="room-info"><span class="room-name"><i class="fa-solid fa-comments"></i> ${subName}</span></div>
                    <div class="room-actions">
                        <button class="btn-success btn-sm" onclick="switchRoom('${subName}', '${mainName}')">入室</button>
                    </div>
                `;
                roomList.appendChild(liSub);
            });
        }
    });
}

// 1. メイン会議室作成
createBtn.onclick = async () => {
    const roomName = roomIdInput.value.trim();
    if (!roomName) return alert("部屋名を入力してください");
    if (!(await initLocalStream())) return alert("マイクの準備に失敗しました。");

    isHost = true;
    mainRoomName = roomName;
    
    let data = JSON.parse(localStorage.getItem('gmeet_breakout_data') || '{}');
    data[roomName] = { subRooms: [] };
    localStorage.setItem('gmeet_breakout_data', JSON.stringify(data));

    breakoutController.style.display = "block";
    stopBreakoutBtn.style.display = "none";
    
    connectToPeer(roomName);
};

// 2. メンバーをグループに分ける（ホスト用トリガー）
startBreakoutBtn.onclick = () => {
    if (!mainRoomName) return;
    const count = parseInt(groupCountSelect.value);
    let subRoomArray = [];
    for (let i = 1; i <= count; i++) {
        subRoomArray.push(`${mainRoomName}-グループ${i}`);
    }

    let data = JSON.parse(localStorage.getItem('gmeet_breakout_data') || '{}');
    if (data[mainRoomName]) {
        data[mainRoomName].subRooms = subRoomArray;
        localStorage.setItem('gmeet_breakout_data', JSON.stringify(data));
    }
    stopBreakoutBtn.style.display = "inline-block";
    syncGlobalRooms();
    alert(`${count}つのグループにメンバーを分割しました！リストから各自移動できます。`);
};

// グループ全解散
stopBreakoutBtn.onclick = () => {
    let data = JSON.parse(localStorage.getItem('gmeet_breakout_data') || '{}');
    if (data[mainRoomName]) {
        data[mainRoomName].subRooms = [];
        localStorage.setItem('gmeet_breakout_data', JSON.stringify(data));
    }
    stopBreakoutBtn.style.display = "none";
    syncGlobalRooms();
    alert("グループをすべて解散しました。本会場へ戻ってください。");
};

// 3. 部屋の切り替え・移動処理（WebRTCの再接続）
function switchRoom(targetRoomName, belongsToMain) {
    if (activeRoomName === targetRoomName) return; // すでにその部屋にいる
    
    updateStatus(`${targetRoomName} へ移動中...`);
    mainRoomName = belongsToMain;

    // 現在の通話接続だけを完全に切る
    if (currentCall) currentCall.close();
    if (peer) peer.destroy();
    remoteVideoWrapper.style.display = "none";

    // 新しい部屋名で通信を再確立
    initLocalStream().then(() => {
        connectToPeer(targetRoomName);
    });
}

// 実際のPeerJS接続処理
function connectToPeer(targetRoomName) {
    activeRoomName = targetRoomName;
    // 自分自身が作った「本会場のホスト」かつ「移動先が本会場」の時だけ待受IDを固定にする
    const useFixedId = (isHost && targetRoomName === mainRoomName);
    const peerId = useFixedId ? ROOM_PREFIX + encodeRoomName(targetRoomName) : null;

    peer = new Peer(peerId);

    peer.on('open', (id) => {
        updateStatus(`部屋: ${targetRoomName}`, true);
        meetingCodeDisplay.innerText = `現在地: ${targetRoomName} ${isHost?'(ホスト)':''}`;
        endCallBtn.style.display = "flex";
        createBtn.disabled = true;
        roomIdInput.disabled = true;

        // 固定IDを使わない（ゲストまたはサブグループへの移動）の場合、ホスト（本会場）に自動発信する
        if (!useFixedId) {
            const hostId = ROOM_PREFIX + encodeRoomName(targetRoomName);
            const call = peer.call(hostId, localStream);
            currentCall = call;
            handleCallStream(call);
        }
    });

    peer.on('call', (call) => {
        // ホスト（またはグループ先駆者）が承認
        const accept = confirm(`【入室申請】この部屋（${targetRoomName}）への参加を許可しますか？`);
        if (!accept) { call.close(); return; }
        currentCall = call;
        call.answer(localStream);
        handleCallStream(call);
    });
}

function handleCallStream(call) {
    remoteVideoWrapper.style.display = "flex";
    call.on('stream', (remoteStream) => {
        remoteVideo.srcObject = remoteStream;
        const videoTrack = remoteStream.getVideoTracks()[0];
        if (videoTrack && videoTrack.enabled) {
            remoteVideoWrapper.classList.remove('video-off');
        } else {
            remoteVideoWrapper.classList.add('video-off');
        }
    });
    call.on('close', () => { remoteVideoWrapper.style.display = "none"; });
}

function deleteMainRoom(name) {
    if(!confirm(`「${name}」の会議室・および紐づくグループをすべて完全に消去しますか？`)) return;
    let data = JSON.parse(localStorage.getItem('gmeet_breakout_data') || '{}');
    delete data[name];
    localStorage.setItem('gmeet_breakout_data', JSON.stringify(data));
    syncGlobalRooms();
    if (mainRoomName === name) exitMeeting();
}

function exitMeeting() {
    if (currentCall) currentCall.close();
    if (peer) peer.destroy();
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    
    if (isHost && mainRoomName) {
        let data = JSON.parse(localStorage.getItem('gmeet_breakout_data') || '{}');
        delete data[mainRoomName];
        localStorage.setItem('gmeet_breakout_data', JSON.stringify(data));
    }

    remoteVideoWrapper.style.display = "none";
    localVideo.srcObject = null;
    remoteVideo.srcObject = null;
    endCallBtn.style.display = "none";
    breakoutController.style.display = "none";
    createBtn.disabled = false;
    roomIdInput.disabled = false;
    meetingCodeDisplay.innerText = "会議に参加していません";
    updateStatus("ロビーで待機中");
    activeRoomName = ""; mainRoomName = ""; isHost = false;
    syncGlobalRooms();
}

endCallBtn.onclick = () => { if (confirm("会議室を完全に終了しますか？")) exitMeeting(); };
refreshBtn.onclick = () => syncGlobalRooms();

// --- メディア制御 ---
micBtn.onclick = () => {
    if (!localStream) return;
    const t = localStream.getAudioTracks()[0];
    if (t) { t.enabled = !t.enabled; micBtn.classList.toggle('muted', !t.enabled); micBtn.innerHTML = t.enabled ? '<i class="fa-solid fa-microphone"></i>' : '<i class="fa-solid fa-microphone-slash"></i>'; }
};
camBtn.onclick = () => {
    if (!localStream) return;
    const t = localStream.getVideoTracks()[0];
    if (t) { t.enabled = !t.enabled; camBtn.classList.toggle('muted', !t.enabled); camBtn.innerHTML = t.enabled ? '<i class="fa-solid fa-video"></i>' : '<i class="fa-solid fa-video-slash"></i>'; localVideoWrapper.classList.toggle('video-off', !t.enabled); updateTrackInCall(t); }
};
screenBtn.onclick = async () => {
    if (!localStream) return;
    try {
        if (screenBtn.classList.contains('active-screen')) {
            const t = localStream.getVideoTracks()[0]; t.enabled = false;
            camBtn.classList.add('muted'); camBtn.innerHTML = '<i class="fa-solid fa-video-slash"></i>';
            localVideoWrapper.className = "video-wrapper video-off"; updateTrackInCall(t);
            screenBtn.classList.remove('active-screen'); return;
        }
        localVideoWrapper.className = "video-wrapper screen-video";
        const scr = await navigator.mediaDevices.getDisplayMedia({ video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 70 } }, audio: true });
        const track = scr.getVideoTracks()[0];
        updateTrackInCall(track); screenBtn.classList.add('active-screen');
        track.onended = () => {
            const t = localStream.getVideoTracks()[0]; t.enabled = false;
            localVideoWrapper.className = "video-wrapper video-off"; updateTrackInCall(t);
            screenBtn.classList.remove('active-screen');
        };
    } catch (e) {}
};
function updateTrackInCall(nt) { if (currentCall && currentCall.peerConnection) { const s = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video'); if (s) s.replaceTrack(nt); } }

window.onload = () => { syncGlobalRooms(); window.addEventListener('storage', () => syncGlobalRooms()); };
</script>
</body>
</html>
