<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC P2P ミーティングツール　VER2</title>
    <!-- PeerJSライブラリの読み込み -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e24; color: #fff; margin: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .box { background: #2a2a35; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button:disabled { background: #555; }
        input { padding: 10px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; width: 200px; }
        video { width: 100%; max-width: 400px; background: #000; border-radius: 4px; margin-top: 10px; transform: scaleX(-1); }
        .screen-video { transform: none; max-width: 100%; }
        .flex { display: flex; gap: 20px; flex-wrap: wrap; }
        .status { color: #ffc107; font-weight: bold; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #bd2130; }
    </style>
</head>
<body>

<div class="container">
    <h1>WebRTC P2P ミーティング (HTML Only)</h1>
    <div id="status" class="status">状態: 準備中...</div>

    <!-- 1. 会議の作成と参加 -->
    <div class="box">
        <h2>1. 会議を始める / 参加する</h2>
        <div class="flex">
            <div>
                <input type="text" id="roomIdInput" placeholder="会議部屋名（日本語OK）">
                <button id="createBtn">会議を開く（自動参加）</button>
            </div>
            <div style="border-left: 1px solid #444; padding-left: 20px;">
                <button id="refreshBtn">会議リストを更新</button>
                <ul id="roomList" style="margin-top: 10px; padding-left: 20px;"></ul>
            </div>
        </div>
    </div>

    <!-- 2. 通話・共有コントロール -->
    <div class="box" id="meetingControls" style="display:none;">
        <h2>2. 通話コントロール</h2>
        <div class="flex">
            <button id="toggleAudioBtn" class="btn-danger">マイク: ON</button>
            <button id="startCameraBtn">カメラ映像をONにする</button>
            <button id="startScreenBtn" style="background: #28a745;">画面共有 (1080p/70fps)</button>
        </div>
    </div>

    <!-- 3. 映像表示エリア -->
    <div class="box">
        <h2>3. 映像・音声</h2>
        <div class="flex">
            <div>
                <h3>自分の状態</h3>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <div>
                <h3>相手の映像/音声</h3>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>
</div>

<script>
const ROOM_PREFIX = "git-meet-room-";
let peer = null;
let localStream = null;
let currentCall = null;
let isHost = false;

const statusDiv = document.getElementById('status');
const roomIdInput = document.getElementById('roomIdInput');
const createBtn = document.getElementById('createBtn');
const roomList = document.getElementById('roomList');
const refreshBtn = document.getElementById('refreshBtn');
const meetingControls = document.getElementById('meetingControls');
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const toggleAudioBtn = document.getElementById('toggleAudioBtn');

// 日本語対応のための16進数エンコード
function encodeRoomNameForId(str) {
    return Array.from(new TextEncoder().encode(str))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
}

window.onload = () => {
    updateStatus("会議部屋名を入力して作成するか、リストから入室してください。");
    fetchRoomList();
};

function updateStatus(text) {
    statusDiv.innerText = `状態: ${text}`;
}

// 共通機能: 最初に入室する際、カメラ・マイクの許可を求めてマイクだけONにする
async function initLocalStream() {
    try {
        // カメラとマイクの両方の許可ダイアログを出す
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        
        // 初期状態として【カメラの映像トラックのみオフ】にする
        stream.getVideoTracks().forEach(track => track.enabled = false);
        
        localStream = stream;
        localVideo.srcObject = stream;
        return true;
    } catch (e) {
        console.log("カメラまたはマイクの片方が取得できませんでした。マイクのみで再試行します。");
        try {
            // カメラがない環境などのためのフォールバック
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localVideo.srcObject = localStream;
            return true;
        } catch (err) {
            alert("マイクの起動に失敗しました。通話にはマイクが必要です。");
            return false;
        }
    }
}

// 1. 会議を開く（ホスト側・自動参加）
createBtn.onclick = async () => {
    const roomName = roomIdInput.value.trim();
    if (!roomName) return alert("会議部屋名を入力してください");

    updateStatus("デバイスの準備中...");
    const success = await initLocalStream();
    if (!success) return;

    isHost = true;
    const safeRoomId = encodeRoomNameForId(roomName);
    const peerId = ROOM_PREFIX + safeRoomId;

    peer = new Peer(peerId);

    peer.on('open', (id) => {
        updateStatus(`会議「${roomName}」を開き、自動参加しました。参加者を待っています...`);
        meetingControls.style.display = "block";
        createBtn.disabled = true;
        roomIdInput.disabled = true;
        saveRoomToList(roomName);
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            alert("その会議名は既に使われています。別の名前を試してください。");
        } else {
            console.error(err);
        }
        updateStatus("エラーが発生しました。");
    });

    // ゲストからの入室申請を受信
    peer.on('call', (call) => {
        // ホストの許可機能
        const accept = confirm(`参加希望者から入室申請があります。許可しますか？`);
        if (!accept) {
            call.close();
            return;
        }

        updateStatus("通話を許可しました。接続中...");
        currentCall = call;
        
        // 自分のストリーム（マイクON/カメラOFF）を相手に返して接続
        call.answer(localStream);
        handleCallStream(call);
    });
};

// 2. ゲスト側: リストから入室申請
function joinRoom(roomName) {
    isHost = false;
    peer = new Peer();

    peer.on('open', async (id) => {
        updateStatus(`デバイスの準備中...`);
        const success = await initLocalStream();
        if (!success) return;

        updateStatus(`ホストに入室申請を送っています...承認を待ってください。`);
        meetingControls.style.display = "block";

        const safeRoomId = encodeRoomNameForId(roomName);
        const hostPeerId = ROOM_PREFIX + safeRoomId;
        
        // ホストを呼び出す
        const call = peer.call(hostPeerId, localStream);
        currentCall = call;
        handleCallStream(call);
    });
}

function handleCallStream(call) {
    call.on('stream', (remoteStream) => {
        updateStatus("通話中");
        remoteVideo.srcObject = remoteStream;
    });
    call.on('close', () => {
        updateStatus("通話が終了しました。");
        remoteVideo.srcObject = null;
    });
}

// 3. リスト管理機能（簡易 localStorage 同期モック）
refreshBtn.onclick = () => { fetchRoomList(); };

function saveRoomToList(name) {
    let rooms = JSON.parse(localStorage.getItem('active_rooms') || '[]');
    if (!rooms.includes(name)) rooms.push(name);
    localStorage.setItem('active_rooms', JSON.stringify(rooms));
}

function fetchRoomList() {
    roomList.innerHTML = "";
    let rooms = JSON.parse(localStorage.getItem('active_rooms') || '[]');
    if (rooms.length === 0) {
        roomList.innerHTML = "<li>有効な会議がありません（更新ボタンを押してください）</li>";
        return;
    }
    rooms.forEach(room => {
        const li = document.createElement('li');
        li.innerHTML = `部屋: <strong>${room}</strong> `;
        const joinBtn = document.createElement('button');
        joinBtn.innerText = "入室申請する";
        joinBtn.style.padding = "2px 8px";
        joinBtn.onclick = () => joinRoom(room);
        li.appendChild(joinBtn);
        roomList.appendChild(li);
    });
}

// --- コントロールボタンの処理 ---

// マイクのON/OFF切り替え
toggleAudioBtn.onclick = () => {
    if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            if (audioTrack.enabled) {
                toggleAudioBtn.innerText = "マイク: ON";
                toggleAudioBtn.classList.remove('btn-danger');
            } else {
                toggleAudioBtn.innerText = "マイク: MUTE";
                toggleAudioBtn.classList.add('btn-danger');
            }
        }
    }
};

// カメラ映像をONにする（後から有効化）
document.getElementById('startCameraBtn').onclick = () => {
    if (localStream) {
        localVideo.className = ""; // ミラー有効
        const videoTrack = localStream.getVideoTracks()[0];
        if (videoTrack) {
            videoTrack.enabled = true;
            updateTrackInCall(videoTrack);
            alert("カメラ映像をONにしました。");
        } else {
            alert("カメラデバイスが見つかりません。");
        }
    }
};

// 画面共有 (1080p / 70fps 指定でトラックを差し替え)
document.getElementById('startScreenBtn').onclick = async () => {
    try {
        localVideo.className = "screen-video"; // 画面共有時はミラーを解除
        const constraints = {
            video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 70 } },
            audio: true
        };
        const screenStream = await navigator.mediaDevices.getDisplayMedia(constraints);
        const screenTrack = screenStream.getVideoTracks()[0];
        
        // 自分の画面に表示
        updateTrackInCall(screenTrack);

        // 画面共有が停止されたら自動的にカメラトラック（または非表示）に戻す処理
        screenTrack.onended = () => {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.enabled = false; // 一旦オフに戻す
                updateTrackInCall(videoTrack);
            }
            localVideo.className = "";
        };
    } catch (e) { 
        console.error("画面共有キャンセルまたはエラー:", e);
    }
};

// 通話相手にリアルタイムで映像トラックを届けるための関数
function updateTrackInCall(newTrack) {
    // ローカルストリームのトラックを入れ替え
    const oldTrack = localStream.getVideoTracks()[0];
    if (oldTrack) {
        localStream.removeTrack(oldTrack);
    }
    localStream.addTrack(newTrack);
    localVideo.srcObject = localStream;

    // 通話中の場合、相手に送るトラックを動的に差し替える
    if (currentCall && currentCall.peerConnection) {
        const senders = currentCall.peerConnection.getSenders();
        const videoSender = senders.find(s => s.track && s.track.kind === 'video');
        if (videoSender) {
            videoSender.replaceTrack(newTrack);
        } else {
            currentCall.peerConnection.addTrack(newTrack, localStream);
        }
    }
}
</script>
</body>
</html>
